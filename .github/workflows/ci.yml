name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20' # Upgrading from '18' to '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: |
          cd frontend
          npm install
          npm run lint

      - name: Run Tests
        run: npm test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run tests with coverage enforcement
        run: npm test -- --coverage --coverageThreshold='{"global":{"lines":70}}'
